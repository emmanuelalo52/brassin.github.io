# Site settings
title: BrassinAI
description: "Consulting • Research • Engineering"
url: "https://brassinai.com"
baseurl: ""
lang: en
author: BrassinAI
logo: "/images/legacy/brassin2.jpg"
image: "/images/legacy/brassin2.jpg"
social:
  name: BrassinAI
  links:
    - https://linkedin.com/company/brassinai
    - https://github.com/brassinai
twitter:
  username: brassinai
  card: summary_large_image

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Collections / Categories
collections_dir: ""

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Plugins (GitHub Pages supported)
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
  - _old_backup
